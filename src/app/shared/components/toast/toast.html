@if (toast) {
<div (mouseenter)="pauseTimer()" (mouseleave)="resumeTimer()" [class]="'fixed top-2 right-2 z-50 flex flex-col min-w-[320px] max-w-[400px] bg-white shadow-2xl rounded-xl overflow-hidden border transition-all duration-300 transform translate-y-0 ' +
                 (toast.type === 'success' ? 'border-green-100' : 'border-red-100')">

  <div class="flex items-center justify-between p-[30px] gap-3">
    <div class="flex items-center gap-3">
      <span class="text-xl">{{ toast.type === 'success' ? '✅' : '❌' }}</span>
      <p class="text-sm font-semibold text-gray-800 pr-4">{{ toast.message }}</p>
    </div>

    <button type="button" (click)="closeToast(false)"
      class="text-gray-400 hover:text-gray-600 transition-colors duration-150 p-1 rounded-lg hover:bg-gray-100 focus:outline-none">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
        class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <div class="h-1 w-full bg-gray-100 mt-auto overflow-hidden">
    <div class="h-full bg-blue-600 transition-all ease-linear" [style.width.%]="progress"
      [style.transitionDuration.ms]="16">
    </div>
  </div>
</div>
}
